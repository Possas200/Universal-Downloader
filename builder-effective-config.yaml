directories:
  output: dist
  buildResources: build
appId: com.spotwave.app
productName: SpotWave
files:
  - filter:
      - main.js
      - preload.js
      - src/**/*
extraResources:
  - from: bin/
    to: bin/
    filter:
      - '**/*'
win:
  target:
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico
electronVersion: 29.4.6
